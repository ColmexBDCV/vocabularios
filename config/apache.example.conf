<VirtualHost *:80>
    ServerName PLACEHOLDER_SERVER_NAME
    DocumentRoot "PLACEHOLDER_WEB_ROOT"

    <Directory "PLACEHOLDER_WEB_ROOT">
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    AddType text/turtle .ttl
    AddType application/ld+json .jsonld

    Header always set Content-Security-Policy "default-src 'self'; img-src 'self'; style-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    RewriteEngine On
    RewriteRule ^/vocabularios$ /vocabularios/index.html [L]
    RewriteRule ^/vocabularios/seaes$ /vocabularios/seaes/index.html [L]
</VirtualHost>
